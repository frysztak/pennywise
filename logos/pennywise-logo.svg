<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>Pennywise Logo - Pinwheel</title>
  <defs>
    <linearGradient id="coinGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D4A574"/>
      <stop offset="50%" style="stop-color:#CD853F"/>
      <stop offset="100%" style="stop-color:#8B5A2B"/>
    </linearGradient>
    <linearGradient id="innerGlow1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5DEB3"/>
      <stop offset="100%" style="stop-color:#D4A574"/>
    </linearGradient>
  </defs>

  <!-- Outer coin ring -->
  <circle cx="50" cy="50" r="46" fill="url(#coinGradient1)"/>

  <!-- Inner coin face -->
  <circle cx="50" cy="50" r="38" fill="url(#innerGlow1)"/>

  <!-- Three bars in pinwheel arrangement -->
  <g fill="#8B5A2B">
    <!-- Top bar -->
    <rect x="46" y="22" width="8" height="24" rx="4" transform="rotate(0, 50, 50)"/>
    <!-- Bottom left bar -->
    <rect x="46" y="22" width="8" height="24" rx="4" transform="rotate(120, 50, 50)"/>
    <!-- Bottom right bar -->
    <rect x="46" y="22" width="8" height="24" rx="4" transform="rotate(240, 50, 50)"/>
  </g>

  <!-- Center circle -->
  <circle cx="50" cy="50" r="8" fill="#8B5A2B"/>
  <circle cx="50" cy="50" r="4" fill="#F5DEB3"/>
</svg>