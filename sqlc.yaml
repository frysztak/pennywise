version: "2"
sql:
  - engine: "sqlite"
    queries: "db/queries"
    schema: "db/schema"
    gen:
      go:
        out: "db/database"
        emit_json_tags: true
        emit_pointers_for_null_types: true
        overrides:
          - column: "users.password_hash"
            go_struct_tag: json:"-"