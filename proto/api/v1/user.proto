syntax = "proto3";

package api.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

enum UserRole {
  USER_ROLE_UNSPECIFIED = 0;
  USER_ROLE_ADMIN = 1;
  USER_ROLE_REGULAR = 2;
}

message UserRegisterRequest {
  string email = 1 [(buf.validate.field).string.email = true];
  string password = 2 [(buf.validate.field).string.min_len = 6];
  string username = 3 [(buf.validate.field).string.min_len = 3];
}

message UserRegisterResponse {
  string id = 1;
  string email = 2;
  string username = 3;
  UserRole role = 4;
}

message UserInfoRequest {}

message UserInfoResponse {
  string id = 1;
  string email = 2;
  string username = 3;
  UserRole role = 4;
  google.protobuf.Timestamp avatar_updated_at = 5;
}

message GetUsersRequest {}

message GetUsersResponse {
  message User {
    string id = 1;
    string username = 2;
    string email = 3;
  }
  repeated User users = 1;
}

message UploadAvatarRequest {
  bytes avatar_data = 1 [(buf.validate.field).bytes.min_len = 1];
  string mime_type = 2 [(buf.validate.field).string.min_len = 1];
}

message UploadAvatarResponse {}

service UserService {
  rpc UserRegister(UserRegisterRequest) returns (UserRegisterResponse) {}
  rpc UserInfo(UserInfoRequest) returns (UserInfoResponse) {}
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse) {}
  rpc UploadAvatar(UploadAvatarRequest) returns (UploadAvatarResponse) {}
}
