syntax = "proto3";

package api.v1;

import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

message CreateExpenseGroupRequest {
  string name = 1 [(buf.validate.field).string.min_len = 2];
  string description = 2;
  string default_currency = 3 [(buf.validate.field).string.min_len = 2];
}

message CreateExpenseGroupResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  string created_by = 4;
}

message AddUserToGroupRequest {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string group_id = 2 [(buf.validate.field).string.uuid = true];
}

message RemoveUserFromGroupRequest {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string group_id = 2 [(buf.validate.field).string.uuid = true];
}

message UpdateUserWeightRequest {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string group_id = 2 [(buf.validate.field).string.uuid = true];
  double weight = 3 [(buf.validate.field).double.gt = 0];
}

message UpdateGroupRequest {
  string id = 1 [(buf.validate.field).string.min_len = 2];
  string name = 2 [(buf.validate.field).string.min_len = 2];
  string description = 3;
  string default_currency = 4 [(buf.validate.field).string.min_len = 2];
}

message UpdateGroupResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  string created_by = 4;
}

message MemberBalance {
  string user_id = 1;
  string user_name = 2;
  map<string, int64> balance = 3;
  double weight = 4;
}

message UserGroup {
  string user_id = 1;
  string group_id = 2;
  string group_name = 3;
  string group_description = 4;
  string group_default_currency = 5;
  repeated MemberBalance member_balances = 6;
  map<string, int64> total_spending = 7;
}

message GetUserGroupsRequest {}

message GetUserGroupsResponse {
  repeated UserGroup groups = 1;
}

message GetGroupActivityRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetGroupActivityResponse {
  message ActivityItem {
    enum Type {
      TYPE_UNSPECIFIED = 0;
      TYPE_EXPENSE = 1;
      TYPE_TRANSFER = 2;
    }

    message Expense {
      string id = 1;
      google.protobuf.Timestamp created_at = 2;
      string name = 3;
      optional string description = 4;
      string currency = 5;
      string payer_id = 6;
      string payer_name = 7;
      int64 amount = 8;
      repeated string beneficiaries_ids = 9;
      google.protobuf.Timestamp date = 10;
      optional string recurring_id = 11;
    }

    message Transfer {
      string id = 1;
      google.protobuf.Timestamp created_at = 2;
      string sender_id = 3;
      string sender_name = 4;
      string receiver_id = 5;
      string receiver_name = 6;
      int64 amount = 7;
      string currency = 8;
      google.protobuf.Timestamp date = 9;
    }

    Type type = 1;
    oneof data {
      Expense expense = 2;
      Transfer transfer = 3;
    }
  }

  repeated ActivityItem items = 1;
}

message DeleteGroupRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
}

service GroupService {
  rpc CreateExpenseGroup(CreateExpenseGroupRequest) returns (CreateExpenseGroupResponse) {}
  rpc UpdateGroup(UpdateGroupRequest) returns (UpdateGroupResponse) {}
  rpc DeleteGroup(DeleteGroupRequest) returns (google.protobuf.Empty) {}

  rpc AddUserToGroup(AddUserToGroupRequest) returns (google.protobuf.Empty) {}
  rpc RemoveUserFromGroup(RemoveUserFromGroupRequest) returns (google.protobuf.Empty) {}
  rpc UpdateUserWeight(UpdateUserWeightRequest) returns (google.protobuf.Empty) {}

  rpc GetUserGroups(GetUserGroupsRequest) returns (GetUserGroupsResponse) {}
  rpc GetGroupActivity(GetGroupActivityRequest) returns (GetGroupActivityResponse) {}
}
