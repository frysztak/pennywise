syntax = "proto3";

package api.v1;

import "api/v1/pagination.proto";
import "buf/validate/validate.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

enum ActivityTypeFilter {
  ACTIVITY_TYPE_FILTER_UNSPECIFIED = 0;
  ACTIVITY_TYPE_FILTER_EXPENSE = 1;
  ACTIVITY_TYPE_FILTER_TRANSFER = 2;
}

message CreateExpenseGroupRequest {
  string name = 1 [(buf.validate.field).string.min_len = 2];
  string description = 2;
  string default_currency = 3 [(buf.validate.field).string.min_len = 2];
  repeated string currencies = 4 [(buf.validate.field).repeated.min_items = 1];
}

message CreateExpenseGroupResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  string created_by = 4;
}

message AddUserToGroupRequest {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string group_id = 2 [(buf.validate.field).string.uuid = true];
}

message RemoveUserFromGroupRequest {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string group_id = 2 [(buf.validate.field).string.uuid = true];
}

message UpdateUserWeightRequest {
  string user_id = 1 [(buf.validate.field).string.uuid = true];
  string group_id = 2 [(buf.validate.field).string.uuid = true];
  double weight = 3 [(buf.validate.field).double.gt = 0];
}

message UpdateGroupRequest {
  string id = 1 [(buf.validate.field).string.min_len = 2];
  string name = 2 [(buf.validate.field).string.min_len = 2];
  string description = 3;
  string default_currency = 4 [(buf.validate.field).string.min_len = 2];
  repeated string currencies = 5 [(buf.validate.field).repeated.min_items = 1];
}

message UpdateGroupResponse {
  string id = 1;
  string name = 2;
  string description = 3;
  string created_by = 4;
}

message MemberBalance {
  string user_id = 1;
  string user_name = 2;
  map<string, int64> balance = 3;
  double weight = 4;
}

message UserGroup {
  string user_id = 1;
  string group_id = 2;
  string group_name = 3;
  string group_description = 4;
  string group_default_currency = 5;
  repeated MemberBalance member_balances = 6;
  map<string, int64> total_spending = 7;
  repeated string currencies = 8;
  optional google.protobuf.Timestamp image_updated_at = 9;
}

message GetUserGroupsRequest {}

message GetUserGroupsResponse {
  repeated UserGroup groups = 1;
}

message GetGroupActivityRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
  PageRequest page = 2;

  ActivityTypeFilter type_filter = 3;
  optional string currency_filter = 4;
  optional string member_filter = 5;
}

message GetGroupActivityResponse {
  message ActivityItem {
    enum Type {
      TYPE_UNSPECIFIED = 0;
      TYPE_EXPENSE = 1;
      TYPE_TRANSFER = 2;
    }

    message Expense {
      string id = 1;
      google.protobuf.Timestamp created_at = 2;
      string name = 3;
      optional string description = 4;
      string currency = 5;
      string payer_id = 6;
      string payer_name = 7;
      int64 amount = 8;
      repeated string beneficiaries_ids = 9;
      google.protobuf.Timestamp date = 10;
      optional string recurring_id = 11;
    }

    message Transfer {
      string id = 1;
      google.protobuf.Timestamp created_at = 2;
      string sender_id = 3;
      string sender_name = 4;
      string receiver_id = 5;
      string receiver_name = 6;
      int64 amount = 7;
      string currency = 8;
      google.protobuf.Timestamp date = 9;
    }

    Type type = 1;
    oneof data {
      Expense expense = 2;
      Transfer transfer = 3;
    }
  }

  repeated ActivityItem items = 1;
  PageResponse page = 2;
}

message DeleteGroupRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
}

message UploadGroupImageRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
  bytes image_data = 2 [(buf.validate.field).bytes.min_len = 1];
  string mime_type = 3 [(buf.validate.field).string.min_len = 1];
}

message UploadGroupImageResponse {
  google.protobuf.Timestamp image_updated_at = 1;
}

message DeleteGroupImageRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetSettlementSuggestionsRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];

  // Optional: settle all debts in a single currency
  optional string target_currency = 2;

  // Required if target_currency is set: conversion rates from other currencies
  // Key: source currency code, Value: multiplier to get target currency
  map<string, double> conversion_rates = 3;
}

message SettlementSuggestion {
  string from_user_id = 1;
  string from_user_name = 2;
  string to_user_id = 3;
  string to_user_name = 4;
  double amount = 5;
  string currency = 6;
}

message GetSettlementSuggestionsResponse {
  repeated SettlementSuggestion suggestions = 1;

  // List of currencies in the group (for UI to show conversion rate inputs)
  repeated string currencies_in_group = 2;
}

service GroupService {
  rpc CreateExpenseGroup(CreateExpenseGroupRequest) returns (CreateExpenseGroupResponse) {}
  rpc UpdateGroup(UpdateGroupRequest) returns (UpdateGroupResponse) {}
  rpc DeleteGroup(DeleteGroupRequest) returns (google.protobuf.Empty) {}
  rpc UploadGroupImage(UploadGroupImageRequest) returns (UploadGroupImageResponse) {}
  rpc DeleteGroupImage(DeleteGroupImageRequest) returns (google.protobuf.Empty) {}

  rpc AddUserToGroup(AddUserToGroupRequest) returns (google.protobuf.Empty) {}
  rpc RemoveUserFromGroup(RemoveUserFromGroupRequest) returns (google.protobuf.Empty) {}
  rpc UpdateUserWeight(UpdateUserWeightRequest) returns (google.protobuf.Empty) {}

  rpc GetUserGroups(GetUserGroupsRequest) returns (GetUserGroupsResponse) {}
  rpc GetGroupActivity(GetGroupActivityRequest) returns (GetGroupActivityResponse) {}
  rpc GetSettlementSuggestions(GetSettlementSuggestionsRequest) returns (GetSettlementSuggestionsResponse) {}
}
