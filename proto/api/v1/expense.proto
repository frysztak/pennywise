syntax = "proto3";

package api.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

message CreateExpenseRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
  string payer_id = 2 [(buf.validate.field).string.uuid = true];
  string name = 3 [(buf.validate.field).string.min_len = 2];
  string description = 4;
  double amount = 5 [(buf.validate.field).double.gt = 0.0];
  string currency = 6 [(buf.validate.field).string.min_len = 2];
  repeated string beneficiaries_ids = 7;
  google.protobuf.Timestamp date = 8;
}

message CreateExpenseResponse {
  string id = 1;
  string name = 2;
}

message UpdateExpenseRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
  string payer_id = 2 [(buf.validate.field).string.uuid = true];
  string name = 3 [(buf.validate.field).string.min_len = 2];
  string description = 4;
  double amount = 5 [(buf.validate.field).double.gt = 0.0];
  string currency = 6 [(buf.validate.field).string.min_len = 2];
  repeated string beneficiaries_ids = 7;
  google.protobuf.Timestamp date = 8;
}

message UpdateExpenseResponse {
  string id = 1;
  string name = 2;
}

message DeleteExpenseRequest {
  string id = 1 [(buf.validate.field).string.uuid = true];
}

message DeleteExpenseResponse {}

message GetGroupExpensesRequest {
  string group_id = 1 [(buf.validate.field).string.uuid = true];
}

message GetGroupExpensesResponse {
  message Expense {
    string id = 1;
    google.protobuf.Timestamp created_at = 2;
    string name = 3;
    optional string description = 4;
    string currency = 5;
    string payer_id = 6;
    string payer_name = 7;
    int64 amount = 8;
    repeated string beneficiaries_ids = 9;
    google.protobuf.Timestamp date = 10;
  }

  repeated Expense expenses = 1;
}

service ExpenseService {
  rpc CreateExpense(CreateExpenseRequest) returns (CreateExpenseResponse) {}

  rpc UpdateExpense(UpdateExpenseRequest) returns (UpdateExpenseResponse) {}

  rpc DeleteExpense(DeleteExpenseRequest) returns (DeleteExpenseResponse) {}

  rpc GetGroupExpenses(GetGroupExpensesRequest) returns (GetGroupExpensesResponse) {}
}
